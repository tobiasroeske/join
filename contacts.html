<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | Contacts</title>
    <link rel="icon" type="image" href="./assets/img/favicon-join.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/contacts.css">
    <script src="js/main.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/contacts.js"></script>
</head>

<body onload="includeHTML(); init()">

    <!-- Header Section -->
    <header w3-include-html="assets/templates/header.html"></header>
    <main class="main">

        <!-- Sidebar -->
        <div class="sidebar" w3-include-html="assets/templates/sidebar.html"></div>

        <!-- Rightside of the main container-->

        <div class="rightside">
            <!-- Page content goes here -->
            <div class="popup d-none" id="popup">
                <div class="new-contact-container" id="newContact">
                    <div class="add-contact-left">
                        <div class="contact-join-logo"> <img src="assets/img/contact_logo.svg" alt="join logo"></div>
                        <h1 class="page-heading">Add contact</h1>
                        <span class="special-subheading">Tasks are better with a team!</span>
                    </div>
                    <div class="add-contact-right">
                        <img src="assets/img/contacts_close.svg" alt="close icon" class="icon close-icon" onclick="togglePopup()">
                        <img src="assets/img/contact_contact_img.svg" alt="">
                        <form onsubmit="addContact(); return false;" class="contact-form">
                            <div class="input-field">
                                <input type="text" name="" id="nameInput" placeholder="Name" class="special-input">
                                <img src="assets/img/contacts_person.svg" alt="">
                            </div>
                            <div class="input-field">
                                <input type="email" name="" id="emailInput" placeholder="Email" class="special-input">
                                <img src="assets/img/contacts_call.svg" alt="">
                            </div>
                            <div class="input-field">
                                <input type="tel" name="" id="phoneInput" placeholder="Phone" class="special-input">
                                <img src="assets/img/contacts_call.svg" alt="">
                            </div>
                            <div class="contact-submit-field">
                                <div class="submit-btn clear-btn" onclick="togglePopup()">Cancel<img src="assets/img/contacts_close.svg" alt=""></div>
                                <button class="submit-btn add-btn">Create contact <img src="assets/img/check_icon.svg" alt=""></button>
                            </div>
                        </form>
                    </div>
                </div>
            </div>
            <div class="contacts-container">

                <div class="contact-leftside">
                    <div class="contact-list">
                        <button class="add-contact-btn" onclick="togglePopup()">Add new contact <img src="assets/img/contacts_person_add.svg"
                                alt="add contact icon" ></button>
                        <div class="contacts" id="contacts">
                            <div class="contact-box">

                            </div>
                        </div>
                    </div>
                </div>

                <div class="contact-content">
                    <div class="heading-container">
                        <h1 class="page-heading">Contacts</h1>
                        <div class="seperator-heading"></div>
                        <span class="subheading">Better with a team</span>
                    </div>

                    <div class="contact-card" id="contactCard">

                    </div>

                </div>
            </div>
        </div>
    </main>
</body>

</html>
