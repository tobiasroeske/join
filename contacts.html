<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | Contacts</title>
    <link rel="icon" type="image/" href="#">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/contacts.css">
    <script src="js/main.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/contacts.js"></script>
</head>

<body onload="includeHTML(); renderContacts()">

    <!-- Header Section -->
    <header w3-include-html="assets/templates/header.html"></header>
    <main class="main">

        <!-- Sidebar -->
        <div class="sidebar" w3-include-html="assets/templates/sidebar.html"></div>

        <!-- Rightside of the main container-->

        <div class="rightside">
            <!-- Page content goes here -->

            <div class="contacts-container">

                <div class="contact-leftside">
                    <div class="contact-list">
                        <button class="add-contact-btn">Add new contact <img src="assets/img/contacts_person_add.svg"
                                alt="add contact icon"></button>
                        <div class="contacts" id="contacts">
                            <div class="contact-box">

                            </div>
                        </div>
                    </div>
                </div>

                <div class="contact-content">
                    <div class="heading-container">
                        <h1 class="page-heading">Contacts</h1>
                        <div class="seperator-heading"></div>
                        <span class="subheading">Better with a team</span>
                    </div>

                    <div class="contact-card">
                        <div class="contact-heading">
                            <div class="name-initials" id="nameInitials">
                                VN
                            </div>
                            <div class="contact-heading-content">
                                <span class="cotact-name" id="contactName">Vorname Nachname</span>
                                <div class="edit-contact">
                                    <div id="editContact"><img src="assets/img/contacts_edit.svg" alt="edit icon"> Edit</div>
                                    <div id="deleteContact"><img src="assets/img/contacts_delete.svg" alt="delete icon"> Delete</div>
                                </div>
                            </div>
                        </div>

                        <span class="contact-information"> Contact Information</span>

                        <div class="contact-info-box">
                            <div class="info-box">
                                <span class="bold">Email</span>
                                <span class="contact-email" id="contactEmail">nachname.vorname@gmail.com</span>
                            </div>

                            <div class="info-box">
                                <span class="bold">Phone</span>
                                <span>+49 165 8875 225</span>
                            </div>
                        </div>

                    </div>

                </div>
            </div>
        </div>
    </main>
</body>

</html>
