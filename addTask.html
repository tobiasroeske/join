<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join|Add Task</title>
    <link rel="icon" type="image/" href="#">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fonts.css">
    <script src="js/main.js"></script>
</head>

<body onload="includeHTML()">

    <!-- Header Section -->
    <header w3-include-html="assets/templates/header.html"></header>
    <main class="main">

        <!-- Sidebar -->
        <div class="sidebar" w3-include-html="assets/templates/sidebar.html"></div>

        <!-- Rightside of the main container-->

        <div class="rightside">
            
            <div class="add-task">
                <h1>Add Task</h1>
                <form action="">
                    <div class="form-top">
                        <div class="form-side">
                            <label for="titel">Title</label>
                            <input type="text" name="title" id="title-input" class="input" required
                                placeholder="Enter a title">
                            <label for="description">Description</label>
                            <textarea name="description" id="description-textarea" cols="30" rows="10"
                                placeholder="Enter a Description"></textarea>
                            <label for="assignedTo">Assigned to</label>
                            <select name="assignedTo" id="assigenedSelect">
                                <option value="contacts" selected disabled hidden>Select contacts to assign</option>
                            </select>
                        </div>
                        <div class="seperator"></div>
                        <div class="form-side">
                            <label for="dueDate">Due date</label>
                            <input type="date" name="dueDate" id="date-input" placeholder="dd/mm/yyyy" required>
                            <span>Prio</span>
                            <div class="prio-buttons">
                                <button class="prio-btn">Urgent</button>
                                <button class="prio-btn active-btn">Medium</button>
                                <button class="prio-btn">Low</button>
                            </div>
                            <label for="category">Category</label>
                            <select name="category" id="categorySelect">
                                <option value="selectCategory" selected disabled hidden>Select task category</option>
                                <option value="technicalTask">Technical Task</option>
                                <option value="userStory">User Story</option>
                            </select>
                            <label for="subtasks">Subtasks</label>
                            <input type="text" class="input subtask-input" name="subtasks" id="subtaskInput">
                        </div>
                    </div>
                    <div>
                        <span>This field is requiered</span>
                        <div>
                            <button>Clear</button>
                            <button>Create Task</button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>
</body>

</html>
