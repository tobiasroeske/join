<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | Add Task</title>
    <link rel="icon" type="image" href="./assets/img/favicon-join.png">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fonts.css">
    <script defer src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-YvpcrYf0tY3lHB60NNkmXc5s9fDVZLESaAA55NDzOxhy9GkcIdslK1eN7N6jIeHz"
        crossorigin="anonymous"></script>
    <script src="js/main.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/addTask.js"></script>
</head>

<body onload="initAddTask()">

    <!-- Header Section -->
    <header w3-include-html="assets/templates/header.html"></header>
    <main class="main">

        <!-- Sidebar -->
        <div class="sidebar" w3-include-html="assets/templates/sidebar.html"></div>

        <!-- Rightside of the main container-->

        <div class="rightside">
            <div class="add-task" onclick="closePopup('contactsPopup'); closePopup('categoryPopup')">

                <button class="popup-close d-none" onclick="closePopup()" id="popupClose"><img
                        src="./assets/img/close-board.png" alt="" class="close-popup-img"></button>

                <h1 class="page-heading">Add Task</h1>
                <form onsubmit="createNewTask(); return false;" class="form">
                    <div class="task-added" id="taskAdded">Task added to board <img
                            src="assets/img/sidebar_icon_board.svg" alt=""></div>
                    <div class="form-top">
                        <div class="form-side">
                            <div class="input-container">
                                <label for="titleInput">Title<span class="red">*</span></label>
                                <input type="text" name="title" id="titleInput" class="input" required
                                    placeholder="Enter a title">
                            </div>
                            <div class="input-container">
                                <label for="descriptionTextarea">Description</label>
                                <textarea name="description" id="descriptionTextarea" cols="30" rows="10"
                                    placeholder="Enter a Description" class="textarea"></textarea>
                            </div>
                            <div class="input-container"
                                onclick="togglePopup('contactsPopup'); stopCurrentAction(event)">
                                <label for="assignedContacts">Assigned to</label>
                                <div class="input-field category-input">
                                    <input type="text" id="assignedContacts" placeholder="Select Contacts to assign"
                                        class="special-input">
                                    <img src="assets/img/drop_down_array_icon.svg" alt="" class="icon">
                                </div>
                                <div class="category-popup d-none" id="contactsPopup">
                                    <ul class="styled-list" id="contactList">

                                    </ul>
                                </div>
                            </div>
                        </div>

                        <div class="seperator"></div>

                        <div class="form-side">
                            <div class="input-container">
                                <label for="dateInput">Due date<span class="red">*</span></label>
                                <input type="date" name="dueDate" id="dateInput" placeholder="dd/mm/yyyy"
                                    class="input date-input" required>
                            </div>
                            <div class="input-container">
                                <span>Prio</span>
                                <div class="prio-buttons">
                                    <div class="prio-btn" id="urgentBtn"
                                        onclick="selectPriority('urgentBtn', 'urgent-btn'); addPriorityToTask('urgent')">
                                        Urgent
                                        <img src="assets/img/prio_high_icon.svg" alt="high priority icon"
                                            class="prio-icon">
                                    </div>
                                    <div class="prio-btn medium-btn" id="mediumBtn"
                                        onclick="selectPriority('mediumBtn', 'medium-btn'); addPriorityToTask('medium')">
                                        Medium
                                        <img src="assets/img/prio_medium_icon.svg" alt="medium priority icon"
                                            class="medium-icon" class="prio-icon">
                                    </div>
                                    <div class="prio-btn" id="lowBtn"
                                        onclick="selectPriority('lowBtn', 'low-btn'); addPriorityToTask('low')">Low <img
                                            src="assets/img/prio_low_icon.svg" alt="low priority icon"
                                            class="prio-icon"></div>
                                </div>
                            </div>
                            <div class="input-container">
                                <label for="categoryInput">Category<span class="red">*</span></label>
                                <div class="input-field category-input"
                                    onclick="togglePopup('categoryPopup'); stopCurrentAction(event)">
                                    <input type="text" id="categoryInput" placeholder="Select task category"
                                        class="special-input">
                                    <img src="assets/img/drop_down_array_icon.svg" alt="" class="icon">
                                </div>
                                <div class="category-popup d-none" id="categoryPopup">
                                    <ul class="styled-list">
                                        <li id="categoryTechnical" onclick="addCategory('categoryTechnical')">Technical
                                            Task</li>
                                        <li id="categoryUserStory" onclick="addCategory('categoryUserStory')">User Story
                                        </li>
                                    </ul>
                                </div>
                            </div>
                            <div class="input-container">
                                <label for="subtaskInput">Subtasks</label>
                                <div class="input-field">
                                    <input type="text" class="special-input subtask-input" name="subtasks"
                                        id="subtaskInput">
                                    <img src="assets/img/plus_icon.svg" alt="" class="icon">
                                </div>
                            </div>
                        </div>
                    </div>
                    <div class="form-bottom">
                        <span><span class="red">*</span>This field is requiered</span>
                        <div class="submit-container">
                            <div class="submit-btn clear-btn" onclick="resetAddTask()">Clear <img src="assets/img/clear_icon.svg" alt=""></div>
                            <button class="submit-btn add-btn" id="createTaskBtn">Create Task <img
                                    src="assets/img/check_icon.svg" alt=""></button>
                        </div>
                    </div>
                </form>
            </div>
        </div>
    </main>

</body>

</html>
