<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join | Summary</title>
    <link rel="icon" type="image" href="./assets/img/favicon-join.png">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/fonts.css">
    <link rel="stylesheet" href="css/summary.css">
    <script src="js/main.js"></script>
    <script src="js/storage.js"></script>
    <script src="js/summary.js"></script>
</head>
<body onload="init()">

    <!-- Header Section -->
    <header w3-include-html="assets/templates/header.html"></header>
    <main class="main">

        <!-- Sidebar -->
        <div class="sidebar" w3-include-html="assets/templates/sidebar.html"></div>

        <!-- Rightside of the main container-->

        <div class="rightside">
            <!-- Page content goes here -->
            <div class="summary">
                <div class="summary-headline">
                    <h1 class="page-heading">Join 360</h1>
                    <div class="summary-seperator"></div>
                    <h2 class="special-subheading">Key Metrics at a Glance</h2>
                </div>
                <div class="summary-content">
                    <div class="content-left">
                        <div class="row">
                            <div class="todo">
                                <div class="summary-symbol">
                                    <img src="assets/img/summary_edit_white.svg" alt="" class="summary-icon">
                                </div>
                                <div class="summary-text">
                                    <span class="number">1</span>
                                    <span class="summary-text">To-do</span>
                                </div>
                            </div>
                            <div class="done">
                                <div class="summary-symbol">
                                    <img src="assets/img/summary_check_white.svg" alt="" class="summary-icon">
                                </div>
                                <div class="summary-text">
                                    <span class="number">5</span>
                                    <span class="summary-text">Done</span>
                                </div>
                            </div>
                        </div>

                        <div class="full-row">
                            <div class="summary-urgent">
                                <div class="summary-priority">
                                    <img src="assets/img/summary_high.svg" alt="" class="summary-icon-priority">
                                </div>
                                <div class="summary-text">
                                    <span class="number">1</span>
                                    <span class="summary-text">Urgent</span>
                                </div>
                            </div>
                            <div class="row-seperator">

                            </div>
                            <div class="deadline">
                                <span class="deadline-date">October 16, 2022</span>
                                <span>Upcoming Deadline</span>
                            </div>
                        </div>
                        
                        <div class="row">
                            <div class="task-box">
                                <div class="summary-text">
                                    <span class="number">5</span>
                                    <span class="summary-text">Tasks in <br>Board</span>
                                </div>
                            </div>
                            <div class="task-box">
                                <div class="summary-text">
                                    <span class="number">3</span>
                                    <span class="summary-text">Tasks In<br>Progress</span>
                                </div>
                            </div>
                            <div class="task-box">
                                <div class="summary-text">
                                    <span class="number">2</span>
                                    <span class="summary-text">Awaiting <br>Feedback</span>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="content-right">
                        <span class="greeting">Good morning,</span>
                        <span class="user-name">Andy Irons</span>
                    </div>
                </div>
            </div>
        </div>
    </main>
</body>
</html>
