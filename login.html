<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Join|Login</title>
    <link rel="icon" type="image/" href="#">
    <link rel="stylesheet" href="css/logIn.css">
    <link rel="stylesheet" href="css/fonts.css">
    <script src="js/main.js"></script>
</head>
<body>
    <header>
        <div class="logo">
            <img src="./assets/img/j-icon.svg" alt="icon">
        </div>
        <div class="sign_up">
            <p>Not a Join user?</p>
            <button class="sign_up_button"><a href="signup.html">Sign up</a></button>
        </div>
    </header>

    <main>
        <form class="form">
            <div class="log_in_field">
                <div class="log_in_headline_container">
                    <h1 class="log_in_headline">Log in</h1>
                </div>
                <div class="input_container">
                    <div class="input-box">
                        <input required id="email" class="input-field" type="email" placeholder="Email">
                        <img class="field_img" src="./assets/img/mail.svg" style="cursor: pointer;">
                        <p id="wrong-mail" class="hide">Wrong E-mail Ups! Try again</p>
                    </div>
                    <div class="input-box">
                        <input required id="password" class="input-field" type="password" placeholder="Password">
                        <img class="field_img" src="./assets/img/lock.svg" style="cursor: pointer;">
                            
                        <p id="wrong-password" class="hide">Wrong password Ups! Try again</p>
                    </div>
                </div>
                <div class="remember">
                    <label><input type="checkbox">Remember me</label>
                </div>
                <div class="buttons">
                    <div class="log-in-button">
                        <button><a href="#">Log in</a></button>
                    </div>
                    <div class="guest-button">
                        <button><a href="#">Guest Log in</a></button>
                    </div>
                </div>
            </div>
        </form>
    </main>
    <footer>
        <div class="privacy-legal">
            <div>
                <a href="privacyPolicy.html">Privacy Policy</a>
            </div>
            <div>
                <a href="legalNotice.html">Legal notice</a>
            </div>
    </div>
    </footer>
</body>
</html>
